name: clickup-2api

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: clickup-2api:local
    container_name: clickup-2api
    restart: unless-stopped
    init: true
    env_file:
      - path: .env
        required: true
    environment:
      HOST: "0.0.0.0"
      PORT: "8787"
    ports:
      - "127.0.0.1:${PORT:-8787}:8787"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=3).read()
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 15s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 10s
